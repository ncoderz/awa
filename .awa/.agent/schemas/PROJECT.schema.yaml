target-files: ".awa/specs/PROJECT.md"
description: >
  Concise project summary. Covers what the project is, source layout,
  key architectural rules, and essential developer commands.
  Feature Codes and Rules sections are auto-generated by `awa check`.
  One file per project.
line-limit: 200

sections:
  - heading: "PROJECT — .*"
    level: 1
    required: true
    description: >
      Document title in the form `# PROJECT — {project-name}`.
      Followed immediately by a blockquote (>) with a single-sentence
      project description: what it does and why it exists.
    contains:
      - pattern: "^>"
        label: "project description blockquote"
        description: "Blockquote with a one-sentence project summary."

  - heading: "Technology Stack"
    level: 2
    required: true
    description: >
      Bullet list of technologies with major version only.
      Format: - `{Technology N}` — {purpose}

  - heading: "Directory Layout"
    level: 2
    required: true
    description: >
      Code block with directory tree showing top-level source layout.
      Format: path/  # short description
    contains:
      - code-block: true
        label: "directory tree"
        description: "Plain text directory tree with inline comments."

  - heading: "Developer Commands"
    level: 2
    required: true
    description: >
      Bullet list of essential developer commands.
      Format: - `{command}` — {description}

  - heading: "Project Rules"
    level: 2
    required: true
    description: >
      Bullet list of key project rules and constraints.

  - heading: "Feature Codes"
    level: 2
    required: true
    auto-generated: true
    description: >
      Auto-generated table of feature codes, feature names, and scope boundaries.
      Preceded by a description line pointing to `awa spec codes`.
      Managed by `awa check` — do not edit manually.

example: |
  # PROJECT — awa

  > CLI that generates AI coding agent configuration files from templates.

  ## Technology Stack

  - `Node.js 20` — Runtime environment
  - `TypeScript 5` — Type-safe development
  - `Eta 3` — Template rendering
  - `Citty` — CLI framework

  ## Directory Layout

  ```
  src/cli/       # CLI entry, commands, argument parsing
  src/core/      # Template engine, file generator
  src/utils/     # Shared utilities
  templates/     # Bundled Eta templates
  .awa/          # Specs, tasks, plans (see links below)
  ```

  ## Developer Commands

  - `npm install` — Install dependencies
  - `npm run dev` — Run in development mode
  - `npm test` — Run test suite
  - `npm run lint` — Run linter
  - `npm run build` — Build for production
  - `npx awa check --spec-only` — Validate specs
  - `npx awa check` — Full traceability check

  ## Project Rules

  - All file I/O goes through the I/O layer — core never touches `fs` directly.
  - Core engine must not depend on CLI layer.
  - Templates are stateless and deterministic.
  - Errors must include actionable messages with file paths.
  - All public APIs must have TypeScript types.

  ## Feature Codes

  Run `awa spec codes` for the live inventory. The table below defines scope boundaries.

  | Code | Feature | Scope Boundary |
  |------|---------|----------------|

